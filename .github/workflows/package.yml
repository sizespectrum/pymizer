name: package

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test-artifacts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        artifact: ["wheel", "sdist"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependency
        shell: bash
        run: |
          Rscript -e 'install.packages("mizer", repos="https://cloud.r-project.org")'

      - name: Install packaging tools
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        shell: bash
        run: |
          python -m build
          python -m twine check dist/*

      - name: Install built artifact
        shell: bash
        run: |
          python -m venv .pkg-test
          . .pkg-test/bin/activate
          python -m pip install --upgrade pip
          if [ "${{ matrix.artifact }}" = "wheel" ]; then
            python -m pip install dist/*.whl
          else
            python -m pip install dist/*.tar.gz
          fi
          python -m pip install pytest

      - name: Smoke test installed package
        shell: bash
        run: |
          . .pkg-test/bin/activate
          python - <<'PY'
          import pymizer as mz

          diagnostics = mz.runtime_diagnostics()
          assert diagnostics["rpy2_import_ok"] is True
          assert diagnostics["compatibility"] is True
          assert diagnostics["versions"]["mizer"]
          print(diagnostics)
          PY

      - name: Run tests against installed package
        shell: bash
        run: |
          . .pkg-test/bin/activate
          pytest tests
