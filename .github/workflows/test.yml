name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            r-version: "release"
          - python-version: "3.11"
            r-version: "release"
          - python-version: "3.12"
            r-version: "release"
          - python-version: "3.11"
            r-version: "oldrel-1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
          use-public-rspm: true

      - name: Install R dependency
        shell: bash
        run: |
          Rscript -e 'install.packages("mizer", repos="https://cloud.r-project.org")'

      - name: Install pymizer test environment
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run pytest suite
        shell: bash
        env:
          MPLBACKEND: Agg
        run: |
          pytest tests

  docs-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R dependency
        shell: bash
        run: |
          Rscript -e 'install.packages("mizer", repos="https://cloud.r-project.org")'

      - name: Install pymizer docs environment
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Build API reference
        shell: bash
        run: |
          quartodoc build --config docs/_quarto.yml

      - name: Render documentation site
        shell: bash
        run: |
          export QUARTO_PYTHON="$(python -c 'import sys; print(sys.executable)')"
          export MPLBACKEND=Agg
          quarto render docs

      - name: Verify generated docs artifacts
        shell: bash
        run: |
          test -f docs/api/index.qmd
          test -f docs/_site/index.html
